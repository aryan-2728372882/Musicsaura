<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#080810">
  <title>Sign In — MusicsAura</title>
  <link rel="icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"
    }
  }
  </script>
  <style>
    html, body { overflow: auto; height: auto; }
  </style>
</head>
<body class="page-scroll">
<div class="auth-page">
  <div class="auth-card" id="auth-card">
    <img src="assets/logo.png" alt="MusicsAura" class="auth-logo">
    <h1>MusicsAura</h1>
    <p class="tagline">Your vibe, your music. Hindi, Punjabi, Haryanvi & Bhojpuri — all in one place.</p>

    <div class="auth-error" id="auth-error"></div>

    <!-- Google Sign In -->
    <button class="btn-google" id="btn-google">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="auth-divider">or</div>

    <!-- Email/Password form -->
    <div id="login-form">
      <div class="auth-input-group">
        <label for="email">Email</label>
        <input class="auth-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="auth-input-group">
        <label for="password">Password</label>
        <input class="auth-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="btn-login" style="margin-bottom:0.6rem">Sign In</button>
    </div>

    <div class="auth-switch" id="auth-switch">
      Don't have an account? <span id="toggle-form">Create one</span>
    </div>
  </div>
</div>

<script src="scripts/sw-manager.js" defer></script>
<script type="module">
  import {
    auth, db, provider, isAdmin,
    onAuthStateChanged, signOut,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    updateProfile,
    doc, setDoc, getDoc, serverTimestamp
  } from "./scripts/firebase-config.js";

  onAuthStateChanged(auth, user => {
    if (user) redirect(user);
  });

  function redirect(user) {
    location.href = isAdmin(user.email) ? "admin-dashboard.html" : "index.html";
  }

  async function ensureUserDoc(user) {
    try {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        await setDoc(ref, {
          uid: user.uid,
          displayName: user.displayName || user.email?.split("@")[0] || "User",
          email: user.email || "",
          photoURL: user.photoURL || "",
          songsPlayed: 0, minutesListened: 0,
          createdAt: serverTimestamp(),
          lastPlayed: null
        });
      }
    } catch (e) { console.error("ensureUserDoc:", e); }
  }

  function showError(msg) {
    const el = document.getElementById("auth-error");
    el.textContent = msg;
    el.classList.add("visible");
  }
  function clearError() { document.getElementById("auth-error").classList.remove("visible"); }

  // ── Google Sign-In ────────────────────────────────────────────────
  document.getElementById("btn-google").onclick = async () => {
    clearError();
    const btn = document.getElementById("btn-google");
    btn.disabled = true;

    try {
      const { signInWithPopup } =
        await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js");
      const result = await signInWithPopup(auth, provider);
      await ensureUserDoc(result.user);
      redirect(result.user);

    } catch (e) {
      const cancelled =
        e.code === "auth/popup-closed-by-user" ||
        e.message === "User cancelled." ||
        e.message === "The user canceled the sign-in flow.";
      if (!cancelled) showError(e.message || "Google sign-in failed.");
    } finally {
      btn.disabled = false;
    }
  };

  // ── Email sign in / sign up ───────────────────────────────────────
  let isSignUp = false;
  const loginBtn  = document.getElementById("btn-login");
  const toggleBtn = document.getElementById("toggle-form");
  const emailInp  = document.getElementById("email");
  const passInp   = document.getElementById("password");
  const switchEl  = document.getElementById("auth-switch");

  toggleBtn.onclick = () => {
    isSignUp = !isSignUp;
    loginBtn.textContent  = isSignUp ? "Create Account" : "Sign In";
    toggleBtn.textContent = isSignUp ? "Sign in instead" : "Create one";
    switchEl.firstChild.textContent = isSignUp ? "Already have an account? " : "Don't have an account? ";
    clearError();
  };

  loginBtn.onclick = async () => {
    clearError();
    const email = emailInp.value.trim();
    const pass  = passInp.value;
    if (!email || !pass) { showError("Please enter email and password."); return; }
    loginBtn.disabled = true;
    try {
      let user;
      if (isSignUp) {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        user = cred.user;
        await updateProfile(user, { displayName: email.split("@")[0] });
        await ensureUserDoc(user);
      } else {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        user = cred.user;
      }
      redirect(user);
    } catch (e) {
      const msgs = {
        "auth/invalid-email":        "Invalid email address.",
        "auth/user-not-found":       "No account found with this email.",
        "auth/wrong-password":       "Incorrect password.",
        "auth/email-already-in-use": "Email already in use. Sign in instead.",
        "auth/weak-password":        "Password must be at least 6 characters.",
        "auth/too-many-requests":    "Too many attempts. Try again later."
      };
      showError(msgs[e.code] || e.message);
    } finally {
      loginBtn.disabled = false;
    }
  };

  [emailInp, passInp].forEach(el =>
    el.addEventListener("keydown", e => { if (e.key === "Enter") loginBtn.click(); })
  );
</script>
</body>
</html>
