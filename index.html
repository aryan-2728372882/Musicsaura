<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- CRITICAL: Prevent zoom on tap -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4a90e2" />
  <meta name="description" content="Stream Hindi, Punjabi, Haryanvi & Bhojpuri music with seamless background playback" />
  
  <!-- PWA Configuration -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MusicsAura" />
  
  <title>MusicsAura - Indian Music Player</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="preconnect" href="https://dl.dropboxusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="//dl.dropboxusercontent.com">
  <link rel="preconnect" href="https://www.dropbox.com" crossorigin>
  <link rel="dns-prefetch" href="//www.dropbox.com">
  <link rel="preconnect" href="https://supabase.co" crossorigin>
  <link rel="dns-prefetch" href="//supabase.co">
  <link rel="preconnect" href="https://filegarden.com" crossorigin>
  <link rel="dns-prefetch" href="//filegarden.com">
  
  <!-- PWA Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">

  <!-- FIREBASE IMPORTMAP -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"
    }
  }
  </script>
</head>

<body class="light-theme">
  <div class="app">

    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="logo-area">
        <img src="assets/logo.png" alt="MusicsAura" class="app-logo" />
        <span class="app-title">MusicsAura</span>
      </div>

      <button id="profile-btn" aria-label="Profile">
        <img id="nav-avatar" src="" alt="Profile" />
      </button>
    </header>

    <!-- SEARCH -->
    <div class="search-section">
      <input type="search" id="search" placeholder="Search songs, artists…" autocomplete="off" />
    </div>

    <!-- GENRE DROPDOWN -->
    <div class="genre-wrapper" id="genre-wrapper">
      <button id="genre-btn" class="genre-btn" aria-haspopup="true" aria-expanded="false">
        <span id="genre-label">Hindi</span>
        <span class="material-icons arrow">expand_more</span>
      </button>

      <div id="genre-menu" class="genre-menu" role="menu" aria-hidden="true">
        <div class="genre-item active" data-genre="hindi" role="menuitem">Hindi</div>
        <div class="genre-item" data-genre="punjabi" role="menuitem">Punjabi</div>
        <div class="genre-item" data-genre="haryanvi" role="menuitem">Haryanvi</div>
        <div class="genre-item" data-genre="bhojpuri" role="menuitem">Bhojpuri</div>
        <div class="genre-item" data-genre="remix" role="menuitem">Remix</div>
        <div class="genre-item" data-genre="50s" role="menuitem">Old Hits</div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content" id="main-content">
      <section id="grid" class="song-grid" aria-live="polite"></section>
      <section id="search-grid" class="song-grid" hidden aria-live="polite"></section>
    </main>
  </div>

  <!-- PLAYER - MOVED OUTSIDE APP GRID (Fixed Position) -->
  <footer id="player" class="player" hidden>
    <div class="thumb-placeholder"></div>
    <div class="info">
      <h4 id="player-title">Select a song</h4>
      <audio id="audio" preload="auto" crossorigin="anonymous"></audio>
      <div class="time-row" aria-live="off">
        <span id="current-time">0:00</span>
        <span id="duration-time">0:00</span>
      </div>
      <input type="range" id="seek" value="0" max="100" class="seek-bar" aria-label="Seek" />
    </div>

    <div class="controls">
      <button id="prev" class="icon-btn" aria-label="Previous">
        <span class="material-icons">skip_previous</span>
      </button>
      <button id="play-pause" class="icon-btn" aria-label="Play/Pause">
        <span class="material-icons">play_arrow</span>
      </button>
      <button id="next" class="icon-btn" aria-label="Next">
        <span class="material-icons">skip_next</span>
      </button>
      <button id="repeat" class="icon-btn" aria-label="Repeat">
        <span class="material-icons">repeat</span>
      </button>
    </div>
  </footer>

  <script>
    // Keep mobile interactions smooth without heavy scroll/mutation observers.
    (() => {
      let lastTouchEnd = 0;
      document.addEventListener("touchend", (e) => {
        const now = Date.now();
        const isDoubleTap = now - lastTouchEnd <= 280;
        const interactiveTarget = e.target?.closest("input, textarea, select, button, a, label");
        if (isDoubleTap && !interactiveTarget) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });

      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }

      window.addEventListener("pageshow", () => {
        const content = document.getElementById("main-content");
        if (!content) return;
        requestAnimationFrame(() => {
          if (content.scrollTop < 0) content.scrollTop = 0;
        });
      }, { passive: true });
    })();
  </script>

  <!-- Load scripts -->
  <script type="module" src="scripts/player.js"></script>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
