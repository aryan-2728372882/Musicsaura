<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#080810">
  <meta name="description" content="Stream Hindi, Punjabi, Haryanvi & Bhojpuri music">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MusicsAura">
  <title>MusicsAura</title>

  <link rel="icon" href="/assets/favicon.ico">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://dl.dropboxusercontent.com" crossorigin>
  <link rel="dns-prefetch" href="//dl.dropboxusercontent.com">
  <link rel="preconnect" href="https://file.garden" crossorigin>
  <link rel="dns-prefetch" href="//file.garden">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">

  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js",
      "firebase/auth":      "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"
    }
  }
  </script>
</head>

<body class="page-app">
  <div class="app">

    <!-- TOP BAR -->
    <header class="top-bar">
      <div class="logo-area">
        <img src="assets/logo.png" alt="MusicsAura" class="app-logo">
        <span class="app-title">MusicsAura</span>
      </div>
      <button id="profile-btn" aria-label="Profile">
        <img id="nav-avatar" src="" alt="Profile">
      </button>
    </header>

    <!-- SEARCH -->
    <div class="search-section">
      <input type="search" id="search" placeholder="Search songs, artists…" autocomplete="off" spellcheck="false">
    </div>

    <!-- GENRE PILLS (flat strip) -->
    <div class="genre-wrapper">
      <button class="genre-btn genre-pill active" data-genre="hindi">Hindi</button>
      <button class="genre-btn genre-pill" data-genre="punjabi">Punjabi</button>
      <button class="genre-btn genre-pill" data-genre="haryanvi">Haryanvi</button>
      <button class="genre-btn genre-pill" data-genre="bhojpuri">Bhojpuri</button>
      <button class="genre-btn genre-pill" data-genre="remix">Remix</button>
      <button class="genre-btn genre-pill" data-genre="50s">Old Hits</button>
    </div>

    <!-- MAIN CONTENT -->
    <main class="content" id="main-content">
      <section id="grid"        class="song-grid" aria-live="polite"></section>
      <section id="search-grid" class="song-grid" hidden aria-live="polite"></section>
    </main>
  </div>

  <!-- PLAYER (fixed, outside grid) -->
  <footer id="player" hidden>
    <div class="player-progress">
      <div id="progress-fill" class="player-progress-fill"></div>
      <input type="range" id="seek" value="0" max="100" aria-label="Seek">
    </div>
    <div class="player-body">
      <div class="thumb-placeholder"></div>
      <audio id="audio" preload="auto" crossorigin="anonymous"></audio>
      <div class="player-info">
        <div id="player-title">Select a song</div>
        <div id="player-artist"></div>
        <div class="time-row">
          <span id="current-time">0:00</span>
          <span id="duration-time">0:00</span>
        </div>
      </div>
      <div class="player-controls">
        <button id="prev" class="icon-btn" aria-label="Previous">
          <span class="material-icons">skip_previous</span>
        </button>
        <button id="play-pause" class="icon-btn play-main" aria-label="Play/Pause">
          <span class="material-icons">play_arrow</span>
        </button>
        <button id="next" class="icon-btn" aria-label="Next">
          <span class="material-icons">skip_next</span>
        </button>
        <button id="repeat" class="icon-btn" aria-label="Repeat">
          <span class="material-icons">repeat</span>
        </button>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script>
    (() => {
      // Prevent double-tap zoom without blocking inputs
      let last = 0;
      document.addEventListener("touchend", e => {
        const now = Date.now();
        if (now - last <= 280 && !e.target?.closest("input,textarea,select,button,a,label")) e.preventDefault();
        last = now;
      }, { passive: false });
      if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    })();
  </script>

  <script src="scripts/sw-manager.js" defer></script>
  <script type="module" src="scripts/player.js"></script>
  <script type="module" src="scripts/app.js"></script>
</body>
</html>
